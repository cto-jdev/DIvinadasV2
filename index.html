<!doctype html>
<html lang="es" data-bs-theme="dark" class="dark-mode">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DivinAds</title>
    <link rel="shortcut icon" href="img/favicon.png">
    <style>
        body {
            margin:0; font-family:'Noto Sans',sans-serif;
            min-height:100vh;
            background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);
            color:#e2e8f0;
            display:flex; align-items:center; justify-content:center;
        }
        .wrap { text-align:center; max-width:480px; padding:40px; }
        img { height:48px; margin-bottom:24px; }
        h1 { font-size:22px; font-weight:600; margin:0 0 8px; }
        p  { font-size:14px; color:#94a3b8; margin:0 0 24px; }
        .btn {
            display:inline-block; padding:12px 28px;
            background:#3b82f6; color:#fff; border-radius:8px;
            text-decoration:none; font-weight:600; font-size:14px;
            transition:background .2s;
        }
        .btn:hover { background:#2563eb; }
        .muted {
            display:block; margin-top:16px; font-size:12px;
            color:#64748b; text-decoration:none;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <img src="img/logo-divinads.png" alt="DivinAds">
        <h1>DivinAds v2.0 — Marketing API</h1>
        <p>Conecta tu cuenta de Facebook Business para acceder a tus Business Managers, Ad Accounts, Páginas y Pixels mediante la API oficial de Meta.</p>
        <a href="connect.html" class="btn">Conectar cuenta</a>
        <a href="dashboard.html" class="muted">Ya conectado → Abrir dashboard</a>
    </div>
</body>
</html>
