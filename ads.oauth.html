<!doctype html>
<html lang="es" data-bs-theme="dark" class="dark-mode">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ads — DivinAds</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/glass.css" rel="stylesheet">
    <link href="css/remixicon.css" rel="stylesheet">
    <link rel="shortcut icon" href="img/favicon.png">
    <style>
        body {
            font-family: 'Noto Sans', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
        }
        .topbar { padding:16px 24px; border-bottom:1px solid rgba(255,255,255,0.08);
            display:flex; align-items:center; justify-content:space-between; }
        .nav-links a { color:#cbd5e1; margin-right:20px; text-decoration:none; font-size:14px; }
        .nav-links a.active { color:#fff; font-weight:600; }
        .nav-links a:hover { color:#fff; }
        .account-select { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
            color:#e2e8f0; padding:8px 12px; border-radius:6px; font-size:13px; min-width:200px; }
        .container-ads { padding:24px; }
        .status-pill { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; }
        .status-dot { width:8px; height:8px; border-radius:50%; }
        .status-ACTIVE            { color:#10b981; }
        .status-ACTIVE .status-dot{ background:#10b981; }
        .status-DISABLED          { color:#ef4444; }
        .status-DISABLED .status-dot{ background:#ef4444; }
        .status-UNSETTLED         { color:#f59e0b; }
        .status-UNSETTLED .status-dot{ background:#f59e0b; }
        .status-PENDING_RISK_REVIEW { color:#f59e0b; }
        .status-PENDING_RISK_REVIEW .status-dot{ background:#f59e0b; }
        .status-CLOSED            { color:#6b7280; }
        .status-CLOSED .status-dot{ background:#6b7280; }
        .empty-state { padding:60px; text-align:center; color:#94a3b8; }
        .empty-state .icon { font-size:48px; margin-bottom:12px; }
        #ads-grid-container { background:rgba(255,255,255,0.03);
            border:1px solid rgba(255,255,255,0.08); border-radius:8px; overflow:hidden; }
    </style>
</head>
<body>
<div class="topbar">
    <div class="d-flex align-items-center">
        <img src="img/logo-divinads.png" alt="DivinAds" height="24" class="me-3">
        <nav class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="bm.oauth.html">Business Managers</a>
            <a href="ads.oauth.html" class="active">Ads</a>
            <a href="page.oauth.html">Páginas</a>
            <a href="connect.html">Cuentas</a>
        </nav>
    </div>
    <div>
        <select id="account-select" class="account-select">
            <option value="">Selecciona una cuenta…</option>
        </select>
    </div>
</div>

<div class="container-ads">
    <div class="d-flex align-items-center justify-content-between mb-3">
        <h4 class="m-0">
            Cuentas de Anuncios
            <span id="count" class="badge bg-success ms-2">0</span>
        </h4>
        <button id="btn-refresh" class="btn btn-sm btn-outline-light">
            <i class="ri-refresh-line"></i> Actualizar
        </button>
    </div>

    <div id="ads-grid-container">
        <div id="ads-grid" class="ag-theme-balham-dark" style="height:70vh; width:100%;"></div>
        <div id="empty-state" class="empty-state" style="display:none;">
            <div class="icon">🔗</div>
            <h5>Sin cuenta conectada</h5>
            <p>Conecta tu cuenta de Facebook para ver tus Ads.</p>
            <a href="connect.html" class="btn btn-primary">Conectar cuenta</a>
        </div>
    </div>
</div>

<script src="js/jquery.js"></script>
<script src="js/ag-grid-enterprise.min.js"></script>
<script src="js/ads.oauth.js"></script>
</body>
</html>
