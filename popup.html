<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DivinAds</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 300px;
            min-height: 190px;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #fff;
            overflow: hidden;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { width: 32px; height: 32px; border-radius: 8px; }
        .app-name { font-size: 18px; font-weight: 700; }
        .version { font-size: 11px; color: rgba(255,255,255,0.45); }
        .status-area {
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.06);
            margin: 10px 12px 8px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .status-dot.checking     { background: #ffa726; animation: pulse 1s infinite; }
        .status-dot.connected    { background: #66bb6a; }
        .status-dot.disconnected { background: #ef5350; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
        .status-text { font-size: 13px; font-weight: 600; }
        .status-sub  { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }
        .actions { padding: 0 12px 14px; display: flex; flex-direction: column; gap: 7px; }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            padding: 9px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: opacity 0.15s, transform 0.1s;
            width: 100%;
        }
        .btn:hover  { opacity: 0.85; }
        .btn:active { transform: scale(0.97); }
        .btn-primary   { background: linear-gradient(90deg, #6366f1, #8b5cf6); color: #fff; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.18); }
    </style>
</head>
<body>
    <div class="header">
        <img src="img/favicon.png" class="logo" alt="DivinAds">
        <div>
            <div class="app-name">DivinAds</div>
            <div class="version" id="ver">v1.0.0</div>
        </div>
    </div>

    <div class="status-area">
        <div class="status-dot checking" id="statusDot"></div>
        <div>
            <div class="status-text" id="statusText">Verificando sesión...</div>
            <div class="status-sub"  id="statusSub"></div>
        </div>
    </div>

    <div class="actions">
        <button class="btn btn-primary"   id="btnDashboard">🚀 Abrir Dashboard</button>
        <button class="btn btn-secondary" id="btnConnect">🔗 Conectar Facebook</button>
    </div>

    <!-- Script externo (requerido por CSP script-src 'self') -->
    <script src="js/popup-launcher.js"></script>
</body>
</html>
