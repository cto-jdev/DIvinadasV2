<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Gestión de BM</title>
        <link href="css/bootstrap.min.css" rel="stylesheet">
        <link href="css/remixicon.css" rel="stylesheet">
        <link href="css/style.css" rel="stylesheet">
        <script src="js/jquery.js"></script>
    </head>
    <body>
        
        <div class="p-3 d-flex flex-column" id="app" style="height: 100vh;" data="popup">
            <div class="d-flex mb-3 text-white">
                <img src="img/logo.png" height="48">
                <div class="ms-3">
                    <span class="d-block fw-bold" style="font-size: 28px; line-height: 28px;">DivinAds</span>
                    <span id="ver"></span>
                </div>
            </div>
            <div class="rounded p-3 h-100 w-100" style="font-size: 14px; background-color: rgba(255, 255, 255, 0.6); backdrop-filter: blur(30px);">
                <div class="d-flex justify-content-between">
                    <strong><i class="text-primary ri-flag-line"></i> <span class="ms-2">Estado de la cuenta</span></strong>
                    <span class="fw-medium" id="t1"></span>
                </div>
                <div class="border-bottom opacity-25 my-2"></div>
                <div class="d-flex justify-content-between">
                    <strong><i class="text-primary ri-coin-line"></i> <span class="ms-2">Límite de gasto diario</span></strong>
                    <span class="fw-medium" id="t2"></span>
                </div>
                <div class="border-bottom opacity-25 my-2"></div>
                <div class="d-flex justify-content-between">
                    <strong><i class="text-primary ri-line-chart-fill"></i> <span class="ms-2">Umbral actual</span></strong>
                    <span class="fw-medium" id="t3"></span>
                </div>
                <div class="border-bottom opacity-25 my-2"></div>
                <div class="d-flex justify-content-between">
                    <strong><i class="text-primary ri-pie-chart-line"></i> <span class="ms-2">Gasto total</span></strong>
                    <span class="fw-medium" id="t4"></span>
                </div>
                <div class="border-bottom opacity-25 my-2"></div>
                <div class="d-flex justify-content-between">
                    <strong><i class="text-primary ri-wallet-line"></i> <span class="ms-2">Saldo</span></strong>
                    <span class="fw-medium" id="t5"></span>
                </div>
                <div class="border-bottom opacity-25 my-2"></div>
                <div class="d-flex justify-content-between">
                    <strong><i class="text-primary ri-time-line"></i> <span class="ms-2">Fecha de creación de la cuenta</span></strong>
                    <span class="fw-medium" id="t6"></span>
                </div>
                <div class="border-bottom opacity-25 my-2"></div>
                <div class="d-flex justify-content-between">
                    <strong><i class="text-primary ri-file-list-3-line"></i> <span class="ms-2">Fecha de facturación</span></strong>
                    <span class="fw-medium" id="t7"></span>
                </div>
                <div class="border-bottom opacity-25 my-2"></div>
                <div class="d-flex justify-content-between">
                    <strong><i class="text-primary ri-eye-off-line"></i> <span class="ms-2">Administradores ocultos</span></strong>
                    <span class="fw-medium" id="t8"></span>
                </div>
                <div class="border-bottom opacity-25 my-2"></div>
                <div class="d-flex justify-content-between">
                    <strong><i class="text-primary ri-account-circle-line"></i> <span class="ms-2">Tipo de cuenta</span></strong>
                    <span class="fw-medium" id="t9"></span>
                </div>
                <div class="border-bottom opacity-25 my-2"></div>
                <div class="d-flex justify-content-between">
                    <strong><i class="text-primary ri-earth-line"></i> <span class="ms-2">Zona horaria</span></strong>
                    <span class="fw-medium" id="t10"></span>
                </div>
                <div class="border-bottom opacity-25 my-2"></div>
                <div class="d-flex justify-content-between">
                    <strong><i class="text-primary ri-bank-card-2-line"></i> <span class="ms-2">Tarjeta de pago</span></strong>
                    <span class="fw-medium" id="t11"></span>
                </div>
                <div class="border-bottom opacity-25 my-2"></div>
                <div class="d-flex justify-content-between">
                    <strong><i class="text-primary ri-shield-line"></i> <span class="ms-2">Permisos de la cuenta</span></strong>
                    <span class="fw-medium" id="t12"></span>
                </div>
            </div>
        </div>

        <script src="js/libs1.js"></script>
        <script src="js/libs2.js"></script>
        <script src="js/libs3.js"></script>
        <script src="js/libs4.js"></script>
        <script src="js/scripts.js"></script>
        <script src="js/popup.js"></script>
    </body>
</html>
