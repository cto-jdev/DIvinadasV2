        <div id="pageLoading"></div>

            <div id="header">
                <div class="header-top">
                    <div class="row align-items-center h-100">
                        <div class="col-4">
                            <span class="titleBar fw-medium d-flex align-items-center">
                                <img src="img/logo-divinads.png" alt="DivinAds Logo" height="30">
                                <span class="appVersion ms-2 fw-medium"></span>
                            </span>
                        </div>
                        <div class="col-4 d-flex justify-content-center">
                            <div class="rounded row fw-medium" style="height: 35px; line-height: 25px; padding: 5px;width:350px;">
                                <a class="col text-decoration-none mx-1 text-white text-center d-block rounded" href="index.html">INICIO</a>
                                <a class="col text-decoration-none mx-1 text-black bg-white bg-opacity-10 shadow text-center d-block rounded" href="javascript:;" style="border: 1px solid rgba(255,255,255,0.2);">CLONES</a>
                                <a class="col text-decoration-none mx-1 text-white text-center d-block rounded" href="ads.html">ADS</a>
                                <a class="col text-decoration-none mx-1 text-white text-center d-block rounded" href="bm.html">BM</a>
                                <a class="col text-decoration-none mx-1 text-white text-center d-block rounded" href="page.html">PAGINAS</a>
                            </div>
                        </div>
                        <div class="col-4 d-flex justify-content-end">
                            <div id="quality"></div>
                        </div>
                    </div>
                </div>

            <div class="app-wrapper rounded overflow-hidden d-flex shadow">
                <div class="account-wrapper d-flex flex-column overflow-hidden flex-grow-1 position-relative overflow-hidden">

                    <div class="border-bottom border-light border-opacity-10 glass-panel mb-2" style="z-index: 101;">
                        <div class="p-3 d-flex justify-content-between" style="height: 59px;">
                            <div class="d-flex">
                                <div class="d-flex">
                                    <button type="button" class="shadow-sm control-btn btn border h-100 me-3" id="start" data-requires-license="true">
                                        <i class="ri-play-fill" style="background-color: #4caf50;"></i>
                                        Iniciar
                                    </button>
                                    <button type="button" class="shadow-sm control-btn btn border h-100 me-3 d-none" id="stop">
                                        <i class="ri-stop-fill" style="background-color: #f44336;"></i>
                                        Detener
                                    </button>
                                </div>
                                <div class="d-flex">
                                    <button type="button" class="shadow-sm control-btn btn border px-2 h-100 me-2" id="importClone">
                                        <i class="ri-play-list-add-line fs-5 m-0" style="color: #666"></i> Importar Datos
                                    </button>
                                    <div class="dropdown me-2">
                                        <button class="shadow-sm control-btn btn border h-100 px-2" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                                            <i class="ri-filter-line fs-5 m-0" style="color: #666"></i>
                                        </button>
                                        <div class="dropdown-menu mt-2 border dropdown-menu-end shadow-sm p-2" style="width: 250px;">
                                            <div class="mb-2">
                                                <strong>Estado</strong>
                                            </div>
                                            <label class="border rounded mb-2 p-2 d-flex align-items-center">
                                                <div class="form-check me-2">
                                                    <input class="form-check-input statusFilter" type="checkbox" value="0">
                                                </div>
                                                <span class="d-flex align-items-center flex-grow-1"><span style="width: 7px; height: 7px" class="d-flex bg-success rounded-circle me-2"></span><strong class="text-success">Activo</strong></span>
                                                <span class="badge rounded-pill text-bg-success status0Count">0</span>
                                            </label>
                                            <label class="border rounded mb-2 p-2 d-flex align-items-center">
                                                <div class="form-check me-2">
                                                    <input class="form-check-input statusFilter" type="checkbox" value="1">
                                                </div>
                                                <span class="d-flex align-items-center flex-grow-1"><span style="width: 7px; height: 7px" class="d-flex bg-danger rounded-circle me-2"></span><strong class="text-danger">Inactivo</strong></span>
                                                <span class="badge rounded-pill text-bg-danger status1Count">0</span>
                                            </label>
                                        </div>
                                    </div>
                                    <button type="button" class="shadow-sm control-btn btn border px-2 h-100" data-bs-toggle="modal" data-bs-target="#customizeModal">
                                        <i class="ri-layout-line fs-5 m-0" style="color: #666"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="flex-grow-1 px-3">
                                <div class="position-relative h-100">
                                    <a href="javascript:;" id="searchSubmit" class="text-dark"><i class="ri-search-line fs-5 position-absolute" style="top: 3px; right: 8px"></i></a>
                                    <input class="form-control h-100 fw-medium" style="padding-right: 30px;" id="search" placeholder="Ingresa palabras clave...">
                                </div>
                            </div>
                            <div class="d-flex gap-3">
                                <div>
                                    <div class="position-relative h-100 d-flex">
                                        <a href="https://chat.whatsapp.com/HsKE3vczj7E1Y6gGcBqVkT" target="_blank" class="shadow-sm control-btn btn border px-2 pe-3 h-100 me-2 text-nowrap">
                                            <i class="ri-customer-service-line fs-5 m-0 me-1" style="color: #666"></i>Soporte
                                        </a>
                                        <a href="/fb-connect.html" id="fbStatusBtn" class="shadow-sm control-btn btn border px-2 pe-3 h-100 me-2 text-nowrap" title="Estado de conexión a Facebook">
                                            <i class="ri-facebook-circle-line fs-5 m-0 me-1" id="fbStatusIcon" style="color:#aaa"></i><span id="fbStatusText">Conectar FB</span>
                                        </a>
                                        <button type="button" class="text-nowrap shadow-sm control-btn btn border px-2 pe-3 h-100" data-bs-toggle="modal" data-bs-target="#settingModal">
                                            <i class="ri-equalizer-line fs-5 m-0 me-1" style="color: #666"></i>Configuración
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <div id="userInfo">
                                <div class="d-flex justify-content-between border-start ms-3 ps-3 h-100" style="width:calc(350px - 1rem)">
                                    <div class="d-flex flex-column">
                                        <div class="position-relative">
                                            <div class="d-flex align-items-center flex-wrap">
                                                <div class="rounded-circle overflow-hidden" style="width: 33px;">
                                                    <div class="skeleton rounded-circle" style="width: 33px; height: 33px"></div>
                                                </div>
                                                <div class="ps-2" style="width: calc(100% - 33px)">
                                                    <span class="d-block skeleton rounded" style="width: 150px; height: 10px; margin-bottom: 9px;"></span>
                                                    <span class="d-block skeleton rounded" style="width: 120px; height: 10px;"></span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="gridLoading" class="d-flex align-items-center justify-content-center"></div>

                    <div id="accounts" class="ag-theme-balham flex-grow-1 h-100"></div>

                    <div class="border-top p-3 py-2 d-flex justify-content-between align-items-center dark-bg dark-border" style="height: 45px;">
                        <div class="d-flex align-items-center border px-3 py-1 rounded">
                            <span class="border-end me-2 pe-2">
                                <strong>Total: </strong>
                                <span id="tong" class="badge text-bg-secondary">0</span>
                            </span>
                            <span class="border-end me-2 pe-2">
                                <strong>Seleccionados:</strong> 
                                <span id="dachon" class="badge text-bg-secondary">0</span>
                            </span>
                            <span>
                                <strong>Resaltados:</strong> 
                                <span id="boiden" class="badge text-bg-secondary">0</span>
                            </span>
                        </div>

                        <div class="d-flex align-items-center border px-3 py-1 rounded">
                            <span class="border-end me-2 pe-2">
                                <strong>ACTIVOS:</strong> 
                                <span class="status0Count badge text-bg-success">0</span>
                            </span>
                            <span class="border-end">
                                <strong>INACTIVOS:</strong> 
                                <span class="status1Count badge text-bg-danger">0</span>
                            </span>
                        </div>
                    </div>
                </div>

                <!-- Copilot Sidebar Integrada -->
                <div id="copilotPanelWrapper" style="width: 320px; min-width: 320px; border-left: 1px solid rgba(255,255,255,0.05);" class="d-none d-xl-block">
                    <div class="copilot-panel">
                        <div class="copilot-header">
                            <div class="dot pulse"></div>
                            <div>
                                <h6 class="m-0 fs-6 fw-bold">Claude Copilot</h6>
                                <small class="text-muted text-opacity-75" style="font-size:11px;">Agentic Marketing | Meta 2026</small>
                            </div>
                            <div class="ms-auto flex-shrink-0">
                                <i class="ri-magic-line" style="color: #c084fc;"></i>
                            </div>
                        </div>
                        <div class="copilot-body d-flex flex-column" id="copilotChat">
                            <div class="mt-auto" id="copilotMessages">
                                <!-- Cargado por copilot-mock.js -->
                            </div>
                        </div>
                        <div class="p-3 border-top border-light border-opacity-10">
                            <form id="copilotForm" class="position-relative m-0" onsubmit="event.preventDefault(); window.mockCopilotSubmit();">
                                <input type="text" id="copilotInput" class="form-control hover-glass text-white" placeholder="Analiza este clon..." style="font-size: 13px; padding-right: 35px; border-radius: 20px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);">
                                <button type="submit" class="btn btn-sm text-primary position-absolute end-0 top-50 translate-middle-y border-0 bg-transparent">
                                    <i class="ri-send-plane-fill" style="color:#38bdf8"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <div id="adPanel" class="dark-bg border-start dark-border d-flex flex-column">

                    <div id="foldButton" class="dark-bg dark-border border border-end-0">
                        <i class="ri-arrow-drop-left-line"></i>
                        <i class="ri-arrow-drop-right-line"></i>
                    </div>

                    <div class="flex-grow-1 overflow-auto">
                        <div class="overflow-auto p-3" data-tool="via">

                            <div class="card shadow-sm border-light-subtle mb-3 p-0 dark-border-0">
                                <div class="p-3">
                                    <div class="form-check form-switch mb-0 ps-0 form-switch-md justify-content-between d-flex align-items-center">
                                        <label class="form-check-label fw-medium d-flex align-items-center">
                                            <i class="ri-shield-check-line fs-5 me-2"></i> <span class="fw-bold">Protección contra Restricciones</span>
                                        </label>
                                        <input class="form-check-input" data-target="khangXmdtSetting" name="khangXmdt" type="checkbox" role="switch">
                                    </div>
                                </div>
                                <div id="khangXmdtSetting" class="p-3 d-none border-top">
                                    
                                    <label class="form-label fw-medium">
                                        Seleccionar plantilla
                                    </label>

                                    <div class="row mb-3">
                                        <div class="col-8">
                                            <input type="text" class="form-control" value="" name="phoiId" readonly="">
                                        </div>
                                        <div class="col-4">
                                            <button type="button" class="shadow-sm control-btn btn border px-2 h-100 w-100 justify-content-center" data-bs-toggle="modal" data-bs-target="#phoiModal">
                                                Seleccionar
                                            </button>
                                        </div>
                                    </div>

                                    <label class="form-label mb-3 fw-medium">
                                        Seleccionar línea
                                    </label>
    
                                    <div class="row">
                                        <div class="col-6">
                                            <div class="form-check">
                                                <input class="form-check-input" type="radio" name="chooseLine" value="policy" id="dong1Bm" checked="">
                                                <label class="form-check-label" for="dong1Bm">
                                                    Línea 1
                                                </label>
                                            </div>
                                        </div>
                                        <div class="col-6">
                                            <div class="form-check">
                                                <input class="form-check-input" type="radio" name="chooseLine" value="unauthorized_use" id="dong2Bm">
                                                <label class="form-check-label" for="dong2Bm">
                                                    Línea 2
                                                </label>
                                            </div>
                                        </div>
                                        <div class="col-6">
                                            <div class="form-check">
                                                <input class="form-check-input" type="radio" name="chooseLine" value="other" id="dong3Bm">
                                                <label class="form-check-label" for="dong3Bm">
                                                    Línea 3
                                                </label>
                                            </div>
                                        </div>
                                        <div class="col-6">
                                            <div class="form-check">
                                                <input class="form-check-input" type="radio" name="chooseLine" value="random" id="randomBm">
                                                <label class="form-check-label" for="randomBm">
                                                    Aleatorio
                                                </label>
                                            </div>
                                        </div>
                                    </div>
    
                                    <div class="my-3">
                                        <label class="form-label fw-medium">
                                            Contenido de protección
                                        </label>
                                        <input type="text" class="form-control" value="No conocemos el error, esperamos que Facebook lo revise" name="noiDungKhang">
                                    </div>
    
                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="checkbox" name="chooseLineOnly" id="chooseLineOnly">
                                        <label class="form-check-label fw-medium" for="chooseLineOnly">
                                            Solo seleccionar línea
                                        </label>
                                    </div>
    
                                </div>
                            </div>

                            <div class="card shadow-sm border-light-subtle mb-3 p-0 dark-border-0">
                                <div class="p-3">
                                    <div class="form-check form-switch mb-0 ps-0 form-switch-md justify-content-between d-flex align-items-center">
                                        <label class="form-check-label fw-medium d-flex align-items-center">
                                            <i class="ri-link fs-5 me-2"></i> <span class="fw-bold">Obtener link de restricción</span>
                                        </label>
                                        <input class="form-check-input" name="getLinkXmdt" type="checkbox" role="switch">
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>

                </div>

            </div>
        </div>

        <div id="contextMenu">
            <ul class="dropdown-menu d-block shadow-sm">
                <li>
                    <a class="dropdown-item" href="javascript:;" id="pasteData">
                        <i class="ri-clipboard-line me-2"></i>
                        Pegar
                    </a>
                </li>
                <li>
                    <a class="dropdown-item" href="javascript:;" id="deleteSelect">
                        <i class="ri-delete-bin-line me-2"></i>
                        Eliminar filas seleccionadas
                    </a>
                </li>
                <li>
                    <a class="dropdown-item" href="javascript:;" id="selectRange">
                        <i class="ri-checkbox-line me-2"></i>
                        Seleccionar filas resaltadas
                    </a>
                </li>
                <li>
                    <a class="dropdown-item" href="javascript:;" id="checkLive">
                        <i class="ri-facebook-circle-fill me-2"></i>
                        Verificar estado
                    </a>
                </li>
            </ul>
        </div>

        <div class="modal fade" id="settingModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content shadow-lg">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5">Configuración</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body p-0">
                        <iframe src="setting.html" border="0" width="100%" height="500px"></iframe>
                    </div>
                    <div class="modal-footer d-flex">
                        <button type="button" data-bs-dismiss="modal" class="btn btn-primary">Guardar configuración</button>
                        <button type="button" data-bs-dismiss="modal" class="btn btn-secondary">Cerrar</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="viewDataModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-xl">
                <div class="modal-content shadow-lg position-relative">
                    <button type="button" class="btn-close position-absolute" data-bs-dismiss="modal" aria-label="Close" style="z-index: 99999;top: 20px;right: 20px;"></button>
                    <div class="modal-body p-0">
                        <iframe src="" border="0" width="100%" height="500px"></iframe>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="modal fade" id="customizeModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content shadow-lg">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5">Personalizar columnas</h1>
                    </div>
                    <div class="modal-body p-0">
                        <div id="colCustomize" class="overflow-y-auto p-3" style="max-height: 350px;">

                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" id="resetColumns" class="btn btn-secondary">Predeterminado</button>
                        <button type="button" id="saveColumns" class="btn btn-primary">Guardar configuración</button>
                    </div>
                </div>
            </div>
        </div>
