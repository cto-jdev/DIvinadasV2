<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Crear Plantilla - DiviAnds</title>
        <link href="css/bootstrap.min.css" rel="stylesheet">
        <link href="css/remixicon.css" rel="stylesheet">
        <link href="css/jquery-ui.min.css" rel="stylesheet">

        <script src="js/jquery.js"></script>
        <script src="js/jquery-ui.min.js"></script>
        <link rel="shortcut icon" href="img/favicon.png">
        
    </head>
    <body>

        <style>
            body {
                font-family: 'Noto Sans', sans-serif;
                -webkit-user-select: none;
                -ms-user-select: none;
                user-select: none; 
                font-size: 14px;
            }

            ::-webkit-scrollbar {
                width: 8px;
                height: 8px;
                padding: 10px;
            }

            ::-webkit-scrollbar-track-piece {
                background: #fff;
            }

            ::-webkit-scrollbar-thumb {
                background: #c2c2c2;
                border-radius: 5px;
            }
            
            .wrapper {
                overflow: auto;
                width: 100vw;
                height: calc(100vh - 120px);
                background-color: #e9f2fd;
                padding: 30px;
            }

            .phoi-elm {
                cursor: grab;
                font-size: 14px;
                font-weight: 600;
            }

            #card {
                position: relative;
                display: inline-block;
            }

            .elm {
                position: absolute;
            }

            .elm.active {
                outline: 2px dashed #0d6efd;
                outline-offset: 2px;
            }

            .panel {
                width: 100%;
                height: 120px;
                background-color: #fff;
            }

            [data-type] {
                cursor: grab;
            }

            [data-type="image"] img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            [data-type="seal"] img {
                width: 100%;
                height: 100%;
            }

            .ui-resizable-n, .ui-resizable-s {
                left: 50%;
                transform: translateX(-50%);
            }
            .ui-resizable-e, .ui-resizable-w {
                top: 50%;
                transform: translateY(-50%);
            }

            .ui-resizable-sw {
                left: -10px;
                bottom: -10px;
            }

            .ui-resizable-se {
                right: -10px;
                bottom: -10px;
                background-image: none!important;
            }

            .ui-resizable-ne {
                top: -10px;
                right: -10px
            }

            .ui-resizable-n {
                top: -10px;
            }

            .ui-resizable-w {
                left: -10px;
            }

            .ui-resizable-e {
                right: -10px;
            }

            .ui-resizable-s {
                bottom: -10px;
            }

            .ui-resizable-nw {
                top: -10px;
                left: -10px;
            }

            .ui-resizable-handle {
                background-color: #0d6efd;
                border-radius: 100%;
                display: none!important;
                width: 15px;
                height: 15px;
            }

            .elm.active .ui-resizable-handle {
                display: block!important;
            }

            #newImage, #loadSeal {
                width: 0;
                height: 0;
                overflow: hidden;
            }

            label[for="newImage"] {
                cursor: pointer;
            }

            .phoiItem {
                position: relative;
                cursor: pointer;
            }

            .phoiItem.active {
                background-color: #f5f5f5;
            }

            .phoiItem.active i {
                display: block;
            }

            .phoiItem i {
                display: none;
                position: absolute;
                top: 3px;
                right: 3px;
                z-index: 1;
            }
            
        </style>

        <div class="modal fade" id="phoiModal" tabindex="-1" aria-labelledby="" aria-hidden="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="exampleModalLabel">Seleccionar</h1>
                    </div>
                    <div class="modal-body">
                        <div id="phoiList"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="previewModal" tabindex="-1" aria-labelledby="" aria-hidden="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="exampleModalLabel">Vista Previa</h1>
                    </div>
                    <div class="modal-body">
                        <img id="previewImage" class="w-100">
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="panel shadow p-3 d-flex border-bottom">
            <div class="d-flex">
                <input type="file" id="newImage" accept="image/*">
                <input type="file" id="loadSeal" accept="image/*">
                <label for="newImage" class="border bg-white rounded p-1 px-4 me-2 d-flex flex-column align-items-center justify-content-center">
                    <i class="ri-image-add-fill fs-5"></i>
                    <strong>Nuevo</strong>
                </label>
                <button class="border bg-white rounded p-1 px-4 me-2 d-flex flex-column align-items-center justify-content-center" data-bs-toggle="modal" data-bs-target="#phoiModal">
                    <i class="ri-folder-line fs-5"></i>
                    <strong>Cargar</strong>
                </button>
                <button id="save" class="border bg-white rounded p-1 px-4 me-2 d-flex flex-column align-items-center justify-content-center">
                    <i class="ri-save-3-fill fs-5"></i>
                    <strong>Guardar</strong>
                </button>
                <button id="test" class="border bg-white rounded p-1 px-4 me-2 d-flex flex-column align-items-center justify-content-center">
                    <i class="ri-eye-fill fs-5"></i>
                    <strong>Probar</strong>
                </button>
            </div>
            <div class="border rounded p-2">
                <div class="d-inline-flex flex-wrap pe-2">
                    <div class="phoi-elm me-2 mb-2" data-type="firstName" draggable="true">
                        <div class="border text-center bg-white py-1 px-3 rounded">Nombre</div>
                    </div>

                    <div class="phoi-elm me-2 mb-2" data-type="lastName" draggable="true">
                        <div class="border text-center bg-white py-1 px-3 rounded">Apellido</div>
                    </div>
                
                    <div class="phoi-elm me-2 mb-2" data-type="fullName" draggable="true">
                        <div class="border text-center bg-white py-1 px-3 rounded">Nombre Completo</div>
                    </div>
            
                    <div class="phoi-elm me-2 mb-2" data-type="gender" draggable="true">
                        <div class="border text-center bg-white py-1 px-3 rounded">Género</div>
                    </div>
                
                    <div class="phoi-elm me-2 mb-2" data-type="birthday" draggable="true">
                        <div class="border text-center bg-white py-1 px-3 rounded">Fecha de Nacimiento</div>
                    </div>
                
                    <div class="phoi-elm me-2 mb-2" data-type="image" draggable="true">
                        <div class="border text-center bg-white py-1 px-3 rounded">Avatar</div>
                    </div>

                    <div class="phoi-elm me-2 mb-2" data-type="seal" draggable="true">
                        <div class="border text-center bg-white py-1 px-3 rounded">Sello</div>
                    </div>

                    <div class="phoi-elm me-2" data-type="random" draggable="true">
                        <div class="border text-center bg-white py-1 px-3 rounded">Aleatorio</div>
                    </div>

                </div>
            </div>
            <div class="ms-3 border rounded p-2 d-flex me-3">
                <div class="me-3">
                    <label style="width: 50px; font-size: 13px; font-weight: 600;" class="mb-2">Tamaño</label>
                    <input style="width: 60px; font-size: 14px;" type="number" name="fontSize" class="form-control p-1" min="0">
                </div>
                <div class="me-3">
                    <label style="width: 50px; font-size: 13px; font-weight: 600;" class="mb-2">Fuente</label>
                    <select style="width: 150px; font-size: 14px;" name="fontFamily" class="form-select p-1"> 
                    </select>
                </div>
                <div class="me-3">
                    <label style="width: 50px; font-size: 13px; font-weight: 600;" class="mb-2">Estilo</label><br>
                    <button class="btn bg-white border p-1 py-0" id="textBold">
                        <i class="ri-bold"></i>
                    </button>
                </div>
                <div class="">
                    <label style="width: 50px; font-size: 13px; font-weight: 600;" class="mb-2">Color</label>
                    <input style="width: 60px; font-size: 14px;" type="color" name="fontColor" class="form-control">
                </div>
            </div>
        </div>

        <div class="wrapper">
            <div id="card"></div>
        </div>

        <script src="js/bootstrap.bundle.min.js"></script>
        <script src="js/sweetalert2.all.min.js"></script>
        <script src="js/scripts.js"></script>
        <script src="js/phoi.js"></script>
    </body>
</html>
