<!doctype html>
<html lang="es" data-bs-theme="dark" class="dark-mode">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Crear Plantilla - DiviAnds</title>
        <link href="css/bootstrap.min.css" rel="stylesheet">
        <link href="css/glass.css" rel="stylesheet">
        <link href="css/animations.css" rel="stylesheet">
        <link href="css/sidebar.css" rel="stylesheet">
        <link href="css/dashboard.css" rel="stylesheet">
        <link href="css/remixicon.css" rel="stylesheet">
        <link href="css/jquery-ui.min.css" rel="stylesheet">

        <script src="js/jquery.js"></script>
        <script src="js/jquery-ui.min.js"></script>
        <link rel="shortcut icon" href="img/favicon.png">
        
    </head>
    <body>

        <style>
            body {
                font-family: 'Noto Sans', sans-serif;
                -webkit-user-select: none;
                -ms-user-select: none;
                user-select: none; 
                font-size: 14px;
            }

            ::-webkit-scrollbar {
                width: 8px;
                height: 8px;
                padding: 10px;
            }

            ::-webkit-scrollbar-track-piece {
                background: #fff;
            }

            ::-webkit-scrollbar-thumb {
                background: #c2c2c2;
                border-radius: 5px;
            }
            
            .wrapper {
                overflow: auto;
                width: 100%;
                height: calc(100vh - 120px);
                background-color: rgba(15, 23, 42, 0.4);
                border-radius: 12px;
                padding: 30px;
            }

            .phoi-elm {
                cursor: grab;
                font-size: 14px;
                font-weight: 600;
            }

            #card {
                position: relative;
                display: inline-block;
            }

            .elm {
                position: absolute;
            }

            .elm.active {
                outline: 2px dashed #0d6efd;
                outline-offset: 2px;
            }

            .panel {
                width: 100%;
                height: 120px;
                background-color: transparent;
            }

            [data-type] {
                cursor: grab;
            }

            [data-type="image"] img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            [data-type="seal"] img {
                width: 100%;
                height: 100%;
            }

            .ui-resizable-n, .ui-resizable-s {
                left: 50%;
                transform: translateX(-50%);
            }
            .ui-resizable-e, .ui-resizable-w {
                top: 50%;
                transform: translateY(-50%);
            }

            .ui-resizable-sw {
                left: -10px;
                bottom: -10px;
            }

            .ui-resizable-se {
                right: -10px;
                bottom: -10px;
                background-image: none!important;
            }

            .ui-resizable-ne {
                top: -10px;
                right: -10px
            }

            .ui-resizable-n {
                top: -10px;
            }

            .ui-resizable-w {
                left: -10px;
            }

            .ui-resizable-e {
                right: -10px;
            }

            .ui-resizable-s {
                bottom: -10px;
            }

            .ui-resizable-nw {
                top: -10px;
                left: -10px;
            }

            .ui-resizable-handle {
                background-color: #0d6efd;
                border-radius: 100%;
                display: none!important;
                width: 15px;
                height: 15px;
            }

            .elm.active .ui-resizable-handle {
                display: block!important;
            }

            #newImage, #loadSeal {
                width: 0;
                height: 0;
                overflow: hidden;
            }

            label[for="newImage"] {
                cursor: pointer;
            }

            .phoiItem {
                position: relative;
                cursor: pointer;
            }

            .phoiItem.active {
                background-color: #f5f5f5;
            }

            .phoiItem.active i {
                display: block;
            }

            .phoiItem i {
                display: none;
                position: absolute;
                top: 3px;
                right: 3px;
                z-index: 1;
            }
            
        </style>

        <div class="modal fade" id="phoiModal" tabindex="-1" aria-labelledby="" aria-hidden="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="exampleModalLabel">Seleccionar</h1>
                    </div>
                    <div class="modal-body">
                        <div id="phoiList"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="previewModal" tabindex="-1" aria-labelledby="" aria-hidden="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="exampleModalLabel">Vista Previa</h1>
                    </div>
                    <div class="modal-body">
                        <img id="previewImage" class="w-100">
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="app" class="main-with-sidebar d-flex flex-column" style="height: 100vh; overflow: hidden; padding: 15px;">
            <div class="app-wrapper rounded overflow-hidden d-flex shadow flex-column flex-grow-1 p-3 glass-panel">
        <div class="panel p-3 d-flex border-bottom border-light border-opacity-10 mb-3 text-white align-items-center flex-wrap gap-2" style="height: auto;">
            <div class="d-flex align-items-center me-3 mb-2">
                <input type="file" id="newImage" accept="image/*" class="d-none">
                <input type="file" id="loadSeal" accept="image/*" class="d-none">
                <label for="newImage" class="btn btn-outline-light d-flex flex-column align-items-center justify-content-center me-2 p-2 px-3" style="cursor: pointer;">
                    <i class="ri-image-add-fill fs-5 mb-1"></i>
                    <strong style="font-size: 11px;">Nuevo</strong>
                </label>
                <button class="btn btn-outline-light d-flex flex-column align-items-center justify-content-center me-2 p-2 px-3" data-bs-toggle="modal" data-bs-target="#phoiModal">
                    <i class="ri-folder-line fs-5 mb-1"></i>
                    <strong style="font-size: 11px;">Cargar</strong>
                </button>
                <button id="save" class="btn btn-outline-light d-flex flex-column align-items-center justify-content-center me-2 p-2 px-3">
                    <i class="ri-save-3-fill fs-5 mb-1"></i>
                    <strong style="font-size: 11px;">Guardar</strong>
                </button>
                <button id="test" class="btn btn-outline-primary d-flex flex-column align-items-center justify-content-center me-2 p-2 px-3">
                    <i class="ri-eye-fill fs-5 mb-1"></i>
                    <strong style="font-size: 11px;">Probar</strong>
                </button>
            </div>
            
            <div class="border border-light border-opacity-25 rounded p-2 me-3 mb-2 flex-grow-1">
                <div class="d-inline-flex flex-wrap gap-2">
                    <div class="phoi-elm flex-grow-1" data-type="firstName" draggable="true">
                        <div class="border border-light border-opacity-50 text-center text-white py-1 px-2 rounded" style="background: rgba(255,255,255,0.1); font-size:12px;">Nombre</div>
                    </div>
                    <div class="phoi-elm flex-grow-1" data-type="lastName" draggable="true">
                        <div class="border border-light border-opacity-50 text-center text-white py-1 px-2 rounded" style="background: rgba(255,255,255,0.1); font-size:12px;">Apellido</div>
                    </div>
                    <div class="phoi-elm flex-grow-1" data-type="fullName" draggable="true">
                        <div class="border border-light border-opacity-50 text-center text-white py-1 px-2 rounded" style="background: rgba(255,255,255,0.1); font-size:12px;">Nombre Completo</div>
                    </div>
                    <div class="phoi-elm flex-grow-1" data-type="gender" draggable="true">
                        <div class="border border-light border-opacity-50 text-center text-white py-1 px-2 rounded" style="background: rgba(255,255,255,0.1); font-size:12px;">Género</div>
                    </div>
                    <div class="phoi-elm flex-grow-1" data-type="birthday" draggable="true">
                        <div class="border border-light border-opacity-50 text-center text-white py-1 px-2 rounded" style="background: rgba(255,255,255,0.1); font-size:12px;">Nacimiento</div>
                    </div>
                    <div class="phoi-elm flex-grow-1" data-type="image" draggable="true">
                        <div class="border border-light border-opacity-50 text-center text-white py-1 px-2 rounded" style="background: rgba(255,255,255,0.1); font-size:12px;">Avatar</div>
                    </div>
                    <div class="phoi-elm flex-grow-1" data-type="seal" draggable="true">
                        <div class="border border-light border-opacity-50 text-center text-white py-1 px-2 rounded" style="background: rgba(255,255,255,0.1); font-size:12px;">Sello</div>
                    </div>
                    <div class="phoi-elm flex-grow-1" data-type="random" draggable="true">
                        <div class="border border-light border-opacity-50 text-center text-white py-1 px-2 rounded" style="background: rgba(255,255,255,0.1); font-size:12px;">Cód. Aleatorio</div>
                    </div>
                </div>
            </div>
            
            <div class="border border-light border-opacity-25 rounded p-2 d-flex align-items-center mb-2 flex-wrap gap-3">
                <div class="d-flex align-items-center">
                    <label style="font-size: 11px; font-weight: 600;" class="me-2 text-white-50">Tamaño</label>
                    <input style="width: 60px; font-size: 13px; background: rgba(0,0,0,0.2); color: white; border: 1px solid rgba(255,255,255,0.2);" type="number" name="fontSize" class="form-control form-control-sm p-1" min="0">
                </div>
                <div class="d-flex align-items-center">
                    <label style="font-size: 11px; font-weight: 600;" class="me-2 text-white-50">Fuente</label>
                    <select style="width: 120px; font-size: 13px; background: rgba(0,0,0,0.2); color: white; border: 1px solid rgba(255,255,255,0.2);" name="fontFamily" class="form-select form-select-sm p-1"> 
                        <option value="Arial" class="text-dark">Arial</option>
                        <option value="Helvetica" class="text-dark">Helvetica</option>
                        <option value="Times New Roman" class="text-dark">Times</option>
                        <option value="Courier New" class="text-dark">Courier</option>
                        <option value="Verdana" class="text-dark">Verdana</option>
                        <option value="Georgia" class="text-dark">Georgia</option>
                        <option value="Impact" class="text-dark">Impact</option>
                        <option value="Tahoma" class="text-dark">Tahoma</option>
                    </select>
                </div>
                <div class="d-flex align-items-center">
                    <button class="btn btn-outline-light btn-sm px-2" id="textBold" title="Negrita">
                        <i class="ri-bold"></i>
                    </button>
                </div>
                <div class="d-flex align-items-center">
                    <label style="font-size: 11px; font-weight: 600;" class="me-2 text-white-50">Color</label>
                    <input style="width: 40px; height: 30px; padding: 0; background: transparent; border: none;" type="color" name="fontColor" class="form-control form-control-color">
                </div>
            </div>
        </div>

        <div class="wrapper border border-light border-opacity-10 w-100 flex-grow-1" style="height: auto; min-height: 400px; display: flex; justify-content: center; overflow: auto;">
            <div id="card" class="position-relative d-flex align-items-center justify-content-center" style="box-shadow: 0 4px 30px rgba(0,0,0,0.5); min-width: 400px; min-height: 250px; background: rgba(0,0,0,0.2); border-radius: 8px;">
                <div class="text-white-50 text-center" id="cardPlaceholder">
                    <i class="ri-image-add-line fs-1 mb-2"></i>
                    <p class="m-0" style="font-size: 13px;">Sube o carga una plantilla para comenzar</p>
                </div>
            </div>
        </div>
    </div>
</div>

        <script src="js/sweetalert2.all.min.js"></script>
        <script src="js/bootstrap.bundle.min.js"></script>
        <script src="js/tinyTooltip.js"></script>
        <!-- FASE 1 SECURITY: Módulos de seguridad -->
        <script src="js/modules/crypto.js"></script>
        <script src="js/modules/validators.js"></script>
        <script src="js/sidebar.js"></script>
        <script src="js/scripts.js"></script>
        <script src="js/phoi.js"></script>
    </body>
</html>
