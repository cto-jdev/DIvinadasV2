<!DOCTYPE html>
<html>
<head>
    <title>Debug Configuración Captcha</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <script src="js/jquery.js"></script>
    <script src="js/scripts.js"></script>
</head>
<body class="container mt-4">
    <h1>🔍 Depuración de Configuración de Captcha</h1>
    <div id="results"></div>
    
    <script>
    $(document).ready(async function() {
        console.log('=== DEPURACIÓN DE CONFIGURACIÓN CAPTCHA ===');
        
        let html = '<div class="card"><div class="card-body">';
        
        try {
            // Verificar configuración guardada
            const setting = await saveSetting();
            console.log('Configuración completa:', setting);
            
            html += '<h3>📋 Configuración Actual</h3>';
            
            if (setting && setting.general) {
                html += '<h4>✅ Configuración General Encontrada</h4>';
                
                // Verificar servicio de captcha
                if (setting.general.captchaService) {
                    html += `<p><strong>Servicio de Captcha:</strong> ${setting.general.captchaService.value || 'No configurado'}</p>`;
                    console.log('Servicio de captcha:', setting.general.captchaService.value);
                } else {
                    html += '<p><strong>❌ Servicio de Captcha:</strong> No configurado</p>';
                    console.log('❌ No hay configuración de servicio de captcha');
                }
                
                // Verificar API key
                if (setting.general.captchaServiceKey) {
                    const apiKey = setting.general.captchaServiceKey.value;
                    if (apiKey) {
                        html += `<p><strong>API Key:</strong> ${apiKey.substring(0, 10)}... (${apiKey.length} caracteres)</p>`;
                        console.log('API Key configurada:', apiKey.substring(0, 10) + '...');
                    } else {
                        html += '<p><strong>❌ API Key:</strong> Vacía</p>';
                        console.log('❌ API Key vacía');
                    }
                } else {
                    html += '<p><strong>❌ API Key:</strong> No configurada</p>';
                    console.log('❌ No hay configuración de API Key');
                }
                
                // Mostrar estructura completa de general
                html += '<h4>🔧 Estructura de Configuración General</h4>';
                html += '<pre style="background: #f8f9fa; padding: 10px; border-radius: 5px; font-size: 12px;">';
                html += JSON.stringify(setting.general, null, 2);
                html += '</pre>';
                
            } else {
                html += '<h4>❌ No se encontró configuración general</h4>';
                console.log('❌ No hay configuración general');
            }
            
            // Verificar localStorage directamente
            html += '<h3>💾 Verificación de localStorage</h3>';
            const settingKey = Object.keys(localStorage).find(key => key.includes('setting'));
            if (settingKey) {
                html += `<p><strong>Clave encontrada:</strong> ${settingKey}</p>`;
                try {
                    const rawSetting = JSON.parse(localStorage[settingKey]);
                    html += '<h4>📄 Configuración Raw</h4>';
                    html += '<pre style="background: #f8f9fa; padding: 10px; border-radius: 5px; font-size: 12px;">';
                    html += JSON.stringify(rawSetting, null, 2);
                    html += '</pre>';
                } catch(e) {
                    html += '<p><strong>❌ Error al parsear configuración:</strong> ' + e.message + '</p>';
                }
            } else {
                html += '<p><strong>❌ No se encontró configuración en localStorage</strong></p>';
            }
            
        } catch (error) {
            html += '<div class="alert alert-danger">';
            html += '<h4>❌ Error al cargar configuración</h4>';
            html += '<p>' + error.message + '</p>';
            html += '</div>';
            console.error('Error:', error);
        }
        
        // Instrucciones para configurar
        html += '<div class="alert alert-info mt-4">';
        html += '<h4>💡 Cómo Configurar el Captcha</h4>';
        html += '<ol>';
        html += '<li>Ve a <a href="setting.html" target="_blank">setting.html</a></li>';
        html += '<li>En la sección "General", busca "Servicio de Captcha"</li>';
        html += '<li>Selecciona uno de los servicios disponibles:</li>';
        html += '<ul>';
        html += '<li><strong>omocaptcha.com</strong> - Servicio OmoCaptcha</li>';
        html += '<li><strong>anticaptcha</strong> - Servicio AntiCaptcha</li>';
        html += '<li><strong>2captcha</strong> - Servicio 2Captcha</li>';
        html += '</ul>';
        html += '<li>Introduce tu API Key del servicio seleccionado</li>';
        html += '<li>Guarda la configuración</li>';
        html += '</ol>';
        html += '</div>';
        
        html += '</div></div>';
        
        $('#results').html(html);
    });
    </script>
</body>
</html>
