                                    <div class="form-check form-switch mb-0 ps-0 form-switch-md justify-content-between d-flex align-items-center">
                                        <label class="form-check-label fw-medium d-flex align-items-center">
                                            <i class="ri-door-closed-line me-2"></i><span class="fw-bold">Abrir cuenta cerrada</span>
                                        </label>
                                        <input class="form-check-input" name="openAccount" type="checkbox" role="switch">
                                    </div>
                                </div>

                            </div>

                            <div class="card shadow-sm border-light-subtle mb-3 p-0 dark-border-0">
    
                                <div class="p-3">
                                    <div class="form-check form-switch mb-0 ps-0 form-switch-md justify-content-between d-flex align-items-center">
                                        <label class="form-check-label fw-medium d-flex align-items-center">
                                            <i class="ri-bank-card-2-line me-2"></i><span class="fw-bold">Agregar tarjeta</span>
                                        </label>
                                        <input class="form-check-input" data-target="addCardSetting" name="addCard" type="checkbox" role="switch">
                                    </div>
                                </div>
    
                                <div id="addCardSetting" class="p-3 d-none border-top">
                                    <div class="row mb-3">
                                        <div class="col-4">
                                            <label class="form-label fw-medium">
                                                Modo
                                            </label>
                                            <select class="form-select" name="addCardMode">
                                                <option value="1">1</option>
                                                <option value="2">2</option>
                                                <option value="3">3</option>
                                                <option value="4">4</option>
                                                <option value="5">5</option>
                                            </select>
                                        </div>
                                        <div class="col-3">
                                            <label class="form-label fw-medium">
                                                Max
                                            </label>
                                            <input type="number" class="form-control" value="10" name="maxCard">
                                        </div>
                                        <div class="col-5">
                                            <label class="form-label fw-medium">
                                            </label>
                                            <button type="button" class="control-btn btn border p-1 w-100 mt-2" data-bs-toggle="modal" data-bs-target="#cardModal">
                                                <i class="ri-bank-card-line fs-5 me-2" style="color: #666;"></i>
                                                Lista de Tarjetas
                                            </button>
                                        </div>
                                    </div>  
                                    
                               
                                </div>

                            </div>

						</div>
					</div>

                </div>

            </div>
        </div>

        <div class="modal fade" id="cardModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5 d-flex align-items-center">
                            Lista de tarjetas
                            <span class="ms-2 badge text-bg-success" id="cardCount">0</span>
                        </h1>
                    </div>
                    <div class="modal-body p-0">
                        <div id="cards" class="ag-theme-balham" style="height: 350px"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-bs-dismiss="modal" aria-label="Close">Cerrar</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="settingModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content shadow-lg">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5">Configuración</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body p-0">
                        <iframe src="setting.html" border="0" width="100%" height="500px"></iframe>
                    </div>
                    <div class="modal-footer d-flex">
                        
                        <button type="button" data-bs-dismiss="modal" class="btn btn-primary">Guardar configuración</button>
                        <button type="button" data-bs-dismiss="modal" class="btn btn-secondary">Cerrar</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="customizeModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content shadow-lg">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5">Personalizar columnas</h1>
                    </div>
                    <div class="modal-body p-0">
                        <div id="colCustomize" class="overflow-y-auto p-3" style="max-height: 350px;">

                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" id="resetColumns" class="btn btn-secondary">Por defecto</button>
                        <button type="button" id="saveColumns" class="btn btn-primary">Guardar configuración</button>
                    </div>
                </div>
            </div>
        </div>
