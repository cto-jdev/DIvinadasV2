<!doctype html>
<html lang="es" data-bs-theme="dark" class="dark-mode">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pixel Health — DivinAds</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/glass.css" rel="stylesheet">
    <link href="css/remixicon.css" rel="stylesheet">
    <link rel="shortcut icon" href="img/favicon.png">
    <style>
        body {
            font-family: 'Noto Sans', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
        }
        .topbar { padding:16px 24px; border-bottom:1px solid rgba(255,255,255,0.08);
            display:flex; align-items:center; justify-content:space-between; }
        .nav-links a { color:#cbd5e1; margin-right:20px; text-decoration:none; font-size:14px; }
        .nav-links a.active { color:#fff; font-weight:600; }
        .account-select, .act-select {
            background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
            color:#e2e8f0; padding:8px 12px; border-radius:6px; font-size:13px; min-width:200px;
        }
        .container-pixel { padding:24px; }
        .health-pill { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; }
        .health-dot { width:8px; height:8px; border-radius:50%; }
        .health-HEALTHY  { color:#10b981; }
        .health-HEALTHY  .health-dot { background:#10b981; }
        .health-WARNING  { color:#f59e0b; }
        .health-WARNING  .health-dot { background:#f59e0b; }
        .health-INACTIVE { color:#ef4444; }
        .health-INACTIVE .health-dot { background:#ef4444; }
        .health-UNKNOWN  { color:#6b7280; }
        .health-UNKNOWN  .health-dot { background:#6b7280; }
        #pixel-grid-container { background:rgba(255,255,255,0.03);
            border:1px solid rgba(255,255,255,0.08); border-radius:8px; overflow:hidden; }
        .empty-state { padding:60px; text-align:center; color:#94a3b8; }
        .empty-state .icon { font-size:48px; margin-bottom:12px; }
    </style>
</head>
<body>
<div class="topbar">
    <div class="d-flex align-items-center">
        <img src="img/logo-divinads.png" alt="DivinAds" height="24" class="me-3">
        <nav class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="bm.html">BM</a>
            <a href="ads.html">Ads</a>
            <a href="page.html">Páginas</a>
            <a href="pixel.html" class="active">Pixel</a>
            <a href="connect.html">Cuentas</a>
        </nav>
    </div>
    <div class="d-flex gap-2">
        <select id="account-select" class="account-select">
            <option value="">Cuenta…</option>
        </select>
        <select id="act-select" class="act-select">
            <option value="">Ad account…</option>
        </select>
    </div>
</div>

<div class="container-pixel">
    <div class="d-flex align-items-center justify-content-between mb-3">
        <h4 class="m-0">
            Pixels
            <span id="count" class="badge bg-success ms-2">0</span>
        </h4>
        <button id="btn-refresh" class="btn btn-sm btn-outline-light">
            <i class="ri-refresh-line"></i> Actualizar
        </button>
    </div>

    <div id="pixel-grid-container">
        <div id="pixel-grid" class="ag-theme-balham-dark" style="height:70vh; width:100%;"></div>
        <div id="empty-state" class="empty-state" style="display:none;">
            <div class="icon">📊</div>
            <h5 id="empty-title">Selecciona una ad account</h5>
            <p id="empty-msg">Elige una cuenta de anuncios para ver sus pixels.</p>
        </div>
    </div>
</div>

<script src="js/jquery.js"></script>
<script src="js/ag-grid-enterprise.min.js"></script>
<script src="js/pixel.js"></script>
</body>
</html>
