<!DOCTYPE html>
<html>
<head>
    <title>Test Save Config</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <script src="js/jquery.js"></script>
    <script src="js/scripts.js"></script>
</head>
<body class="container mt-4">
    <h1>🧪 Test de Guardado de Configuración</h1>
    
    <div class="card">
        <div class="card-body">
            <h3>Configuración de Prueba</h3>
            <div data-tool="general">
                <div class="row mb-3">
                    <div class="col-6">
                        <label class="fw-bold mb-2">Servicio de Captcha</label>
                        <select class="form-select" name="captchaService">
                            <option value="">Seleccionar...</option>
                            <option value="omocaptcha.com">omocaptcha.com</option>
                            <option value="anticaptcha">anticaptcha</option>
                            <option value="2captcha">2captcha</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <label class="fw-bold mb-2">API Key Captcha</label>
                        <input type="text" name="captchaServiceKey" class="form-control" placeholder="Introduce tu API Key">
                    </div>
                </div>
                
                <div class="row mb-3">
                    <div class="col-6">
                        <label class="fw-bold mb-2">Servicio de Teléfono</label>
                        <select class="form-select" name="phoneService">
                            <option value="">Seleccionar...</option>
                            <option value="viotp">viotp.com</option>
                            <option value="xotp">xotp.pro</option>
                            <option value="sim24">sim24.cc</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <label class="fw-bold mb-2">API Key Teléfono</label>
                        <input type="text" name="phoneServiceKey" class="form-control" placeholder="Introduce tu API Key">
                    </div>
                </div>
                
                <button id="saveTest" class="btn btn-primary">Guardar Configuración de Prueba</button>
                <button id="loadTest" class="btn btn-success">Cargar Configuración</button>
                <button id="clearTest" class="btn btn-danger">Limpiar Configuración</button>
            </div>
        </div>
    </div>
    
    <div class="card mt-4">
        <div class="card-body">
            <h3>Resultado</h3>
            <div id="result"></div>
        </div>
    </div>
    
    <script>
    // Simular que estamos en setting.html
    $('#app').remove();
    $('body').append('<div id="app" data="setting" style="display:none;"></div>');
    
    $('#saveTest').click(async function() {
        try {
            console.log('🔄 Guardando configuración...');
            const config = await saveSetting();
            console.log('✅ Configuración guardada:', config);
            
            let html = '<div class="alert alert-success">';
            html += '<h4>✅ Configuración Guardada Exitosamente</h4>';
            html += '<pre>' + JSON.stringify(config, null, 2) + '</pre>';
            html += '</div>';
            
            $('#result').html(html);
        } catch (error) {
            console.error('❌ Error al guardar:', error);
            $('#result').html('<div class="alert alert-danger">❌ Error: ' + error.message + '</div>');
        }
    });
    
    $('#loadTest').click(async function() {
        try {
            console.log('🔄 Cargando configuración...');
            const stored = await getLocalStorage('setting');
            console.log('📄 Configuración almacenada:', stored);
            
            let html = '<div class="alert alert-info">';
            html += '<h4>📄 Configuración Almacenada</h4>';
            if (stored) {
                html += '<pre>' + JSON.stringify(stored, null, 2) + '</pre>';
                
                // Verificar campos específicos
                if (stored.general && stored.general.captchaService) {
                    html += '<p><strong>✅ Servicio de Captcha:</strong> ' + stored.general.captchaService.value + '</p>';
                } else {
                    html += '<p><strong>❌ Servicio de Captcha:</strong> No configurado</p>';
                }
                
                if (stored.general && stored.general.captchaServiceKey) {
                    html += '<p><strong>✅ API Key Captcha:</strong> ' + (stored.general.captchaServiceKey.value ? 'Configurada' : 'Vacía') + '</p>';
                } else {
                    html += '<p><strong>❌ API Key Captcha:</strong> No configurada</p>';
                }
            } else {
                html += '<p>No hay configuración almacenada</p>';
            }
            html += '</div>';
            
            $('#result').html(html);
        } catch (error) {
            console.error('❌ Error al cargar:', error);
            $('#result').html('<div class="alert alert-danger">❌ Error: ' + error.message + '</div>');
        }
    });
    
    $('#clearTest').click(async function() {
        try {
            await removeLocalStorage('setting');
            $('#result').html('<div class="alert alert-warning">🗑️ Configuración eliminada</div>');
            console.log('🗑️ Configuración eliminada');
        } catch (error) {
            console.error('❌ Error al eliminar:', error);
            $('#result').html('<div class="alert alert-danger">❌ Error: ' + error.message + '</div>');
        }
    });
    </script>
</body>
</html>
