<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DivinAds — Opciones</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    max-width: 560px; margin: 40px auto; padding: 0 20px; color: #111; font-size: 14px; }
  h1 { color: #6B21A8; }
  .card { border: 1px solid #E5E7EB; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  label { display: block; margin-bottom: 4px; font-weight: 600; }
  input[type=text] { width: 100%; padding: 8px; border: 1px solid #E5E7EB;
    border-radius: 8px; font-size: 14px; }
  button { padding: 10px 18px; border-radius: 8px; border: none;
    cursor: pointer; font-weight: 600; background: #6B21A8; color: #fff; margin-top: 12px; }
  .muted { color: #6B7280; font-size: 12px; }
  #status { margin-top: 8px; font-size: 13px; }
</style>
</head>
<body>
<h1>DivinAds — Configuración</h1>

<div class="card">
  <h3 style="margin-top:0">Estado de la sesión</h3>
  <div id="session-info" class="muted">Cargando…</div>
  <button id="btn-disconnect"
    style="background:#DC2626;margin-top:12px;display:none">Desconectar</button>
</div>

<div class="card">
  <h3 style="margin-top:0">Etiqueta de este dispositivo</h3>
  <label for="label-input">Nombre para identificar esta instalación</label>
  <input type="text" id="label-input" maxlength="120" placeholder="Ej: Laptop de trabajo">
  <button id="btn-save">Guardar</button>
  <div id="status"></div>
</div>

<div class="card">
  <h3 style="margin-top:0">Panel web</h3>
  <p class="muted">Gestiona conexiones de Meta y miembros del equipo desde el panel.</p>
  <button id="btn-panel" style="margin-top:0">Abrir panel web →</button>
</div>

<script src="options.js"></script>
</body>
</html>
